name: backend-fabric-e2e

on:
  workflow_dispatch:
  push:
    paths:
      - backend/**
      - protected-qr/**
      - ai-service/**
      - blockchain/**
      - scripts/**
      - docs/backend/**
      - docs/protected-qr/**
      - docs/ai-service/**
      - docs/platform/flow-conformance-matrix.md
      - docker-compose.yml
      - .github/workflows/backend-fabric-e2e.yml
  pull_request:
    paths:
      - backend/**
      - protected-qr/**
      - ai-service/**
      - blockchain/**
      - scripts/**
      - docs/backend/**
      - docs/protected-qr/**
      - docs/ai-service/**
      - docs/platform/flow-conformance-matrix.md
      - docker-compose.yml
      - .github/workflows/backend-fabric-e2e.yml

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare runtime secrets
        shell: bash
        run: |
          set -euo pipefail

          backend_secret='${{ secrets.DATN_BACKEND_JWT_SECRET }}'
          qr_secret='${{ secrets.DATN_QR_HMAC_SECRET }}'

          if [[ -z "${backend_secret}" ]]; then
            backend_secret="$(openssl rand -hex 32)"
          fi

          if [[ -z "${qr_secret}" ]]; then
            qr_secret="$(openssl rand -hex 32)"
          fi

          echo "DATN_BACKEND_JWT_SECRET=${backend_secret}" >> "${GITHUB_ENV}"
          echo "DATN_QR_HMAC_SECRET=${qr_secret}" >> "${GITHUB_ENV}"

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/run-all.sh scripts/test-all.sh
          chmod +x scripts/blockchain/*.sh
          chmod +x scripts/ci/*.sh

      - name: Bootstrap Fabric binaries
        run: ./scripts/run-all.sh prereq

      - name: Run repository quality gate (quick)
        run: ./scripts/quality-gate.sh quick

      - name: Run unified full-stack E2E
        run: ./scripts/test-all.sh full

      - name: Gate on test-output artifact statuses
        run: ./scripts/ci/scan-test-output-status.sh

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "--- docker compose logs (tail) ---"
          docker compose logs --no-color backend qr-service qr-python-core mongo | tail -n 500 || true
          echo "--- running containers ---"
          docker ps -a

      - name: Cleanup
        if: always()
        run: |
          ./scripts/run-all.sh down || true
