name: staging-deploy-gate

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Release identifier for staging candidate
        required: true
        type: string
      backend_image:
        description: Backend image reference (<image>@sha256:...)
        required: true
        type: string
      qr_service_image:
        description: Protected-QR Node image reference (<image>@sha256:...)
        required: true
        type: string
      qr_python_image:
        description: Protected-QR Python image reference (<image>@sha256:...)
        required: true
        type: string
      ai_service_image:
        description: AI Node image reference (<image>@sha256:...)
        required: true
        type: string
      ai_python_image:
        description: AI Python image reference (<image>@sha256:...)
        required: true
        type: string
      run_rollback:
        description: Run rollback drill after deploy
        required: true
        default: true
        type: boolean
      rollback_release_id:
        description: Known-good release identifier for rollback
        required: false
        type: string
      rollback_backend_image:
        description: Known-good backend image reference
        required: false
        type: string
      rollback_qr_service_image:
        description: Known-good protected-qr Node image reference
        required: false
        type: string
      rollback_qr_python_image:
        description: Known-good protected-qr Python image reference
        required: false
        type: string
      rollback_ai_service_image:
        description: Known-good AI Node image reference
        required: false
        type: string
      rollback_ai_python_image:
        description: Known-good AI Python image reference
        required: false
        type: string
      smoke_chaincode:
        description: Include chaincode connectivity probe in smoke
        required: true
        default: true
        type: boolean
      run_capacity_gate:
        description: Run release-blocking SLO/capacity gate after deploy
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: read

jobs:
  staging-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare runtime secrets
        shell: bash
        run: |
          set -euo pipefail

          backend_secret='${{ secrets.DATN_BACKEND_JWT_SECRET }}'
          qr_secret='${{ secrets.DATN_QR_HMAC_SECRET }}'

          if [[ -z "${backend_secret}" ]]; then
            backend_secret="$(openssl rand -hex 32)"
          fi

          if [[ -z "${qr_secret}" ]]; then
            qr_secret="$(openssl rand -hex 32)"
          fi

          echo "DATN_BACKEND_JWT_SECRET=${backend_secret}" >> "${GITHUB_ENV}"
          echo "DATN_QR_HMAC_SECRET=${qr_secret}" >> "${GITHUB_ENV}"

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/run-all.sh scripts/test-all.sh
          chmod +x scripts/deploy/*.sh
          chmod +x scripts/blockchain/*.sh
          chmod +x scripts/ci/*.sh

      - name: Login to GHCR
        if: contains(inputs.backend_image, 'ghcr.io/') || contains(inputs.qr_service_image, 'ghcr.io/') || contains(inputs.qr_python_image, 'ghcr.io/') || contains(inputs.ai_service_image, 'ghcr.io/') || contains(inputs.ai_python_image, 'ghcr.io/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build deploy manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/deploy

          cat > .tmp/deploy/release.env <<EOF
          DATN_RELEASE_ID=${{ inputs.release_id }}
          DATN_STAGING_QR_PYTHON_IMAGE=${{ inputs.qr_python_image }}
          DATN_STAGING_QR_SERVICE_IMAGE=${{ inputs.qr_service_image }}
          DATN_STAGING_AI_PYTHON_IMAGE=${{ inputs.ai_python_image }}
          DATN_STAGING_AI_SERVICE_IMAGE=${{ inputs.ai_service_image }}
          DATN_STAGING_BACKEND_IMAGE=${{ inputs.backend_image }}
          EOF

      - name: Validate rollback inputs
        if: inputs.run_rollback
        shell: bash
        run: |
          set -euo pipefail

          required=(
            "${{ inputs.rollback_release_id }}"
            "${{ inputs.rollback_backend_image }}"
            "${{ inputs.rollback_qr_service_image }}"
            "${{ inputs.rollback_qr_python_image }}"
            "${{ inputs.rollback_ai_service_image }}"
            "${{ inputs.rollback_ai_python_image }}"
          )

          for value in "${required[@]}"; do
            if [[ -z "${value}" ]]; then
              echo "Rollback was requested but rollback_* inputs are incomplete." >&2
              exit 1
            fi
          done

          cat > .tmp/deploy/rollback.env <<EOF
          DATN_RELEASE_ID=${{ inputs.rollback_release_id }}
          DATN_STAGING_QR_PYTHON_IMAGE=${{ inputs.rollback_qr_python_image }}
          DATN_STAGING_QR_SERVICE_IMAGE=${{ inputs.rollback_qr_service_image }}
          DATN_STAGING_AI_PYTHON_IMAGE=${{ inputs.rollback_ai_python_image }}
          DATN_STAGING_AI_SERVICE_IMAGE=${{ inputs.rollback_ai_service_image }}
          DATN_STAGING_BACKEND_IMAGE=${{ inputs.rollback_backend_image }}
          EOF

      - name: Deploy staging candidate
        shell: bash
        run: |
          DATN_RELEASE_MANIFEST=.tmp/deploy/release.env \
          DATN_STAGING_CHAINCODE_SMOKE=${{ inputs.smoke_chaincode }} \
          DATN_STAGING_ENFORCE_DIGEST=true \
          DATN_STAGING_ALLOW_EPHEMERAL_SECRETS=false \
          DATN_COMPLIANCE_ENV=staging \
          DATN_KEY_CUSTODY_PROVIDER=kms \
          DATN_KEY_CUSTODY_PROVIDER_REF=kms://datn/staging/application-keys \
          DATN_KEY_ROTATION_MAX_DAYS=90 \
          DATN_KEY_REVOCATION_SLA_HOURS=4 \
          DATN_FABRIC_IDENTITY_CUSTODY_PROVIDER=hsm \
          DATN_FABRIC_IDENTITY_POLICY_REF=policy/fabric-identity-custody-staging \
          DATN_FABRIC_IDENTITY_ROTATION_MAX_DAYS=90 \
          DATN_FABRIC_IDENTITY_REVOCATION_SLA_HOURS=4 \
          DATN_BREAK_GLASS_RUNBOOK_REF='docs/platform/key-custody-compliance.md#break-glass-access-policy' \
          DATN_BREAK_GLASS_APPROVER_GROUP=security-approvers \
          DATN_AUDIT_RETENTION_DAYS=2555 \
          DATN_AUDIT_IMMUTABLE_STORAGE=true \
          DATN_AUDIT_LEGAL_HOLD_POLICY_REF=policy/legal-hold-v1 \
          DATN_AUDIT_EXPORT_ENCRYPTION_KEY_REF=kms://datn/staging/audit-export-key \
          DATN_AUDIT_ACCESS_LOG_ENABLED=true \
          ./scripts/deploy/staging-deploy.sh deploy

      - name: Capacity gate (release-blocking)
        if: inputs.run_capacity_gate
        shell: bash
        run: |
          BASE_URL=http://localhost:8090 \
          PERF_RELEASE_ID=${{ inputs.release_id }} \
          node scripts/backend/e2e-capacity-gate.mjs

      - name: Rollback drill
        if: inputs.run_rollback
        shell: bash
        run: |
          DATN_RELEASE_MANIFEST=.tmp/deploy/rollback.env \
          DATN_STAGING_CHAINCODE_SMOKE=${{ inputs.smoke_chaincode }} \
          DATN_STAGING_ENFORCE_DIGEST=true \
          DATN_STAGING_ALLOW_EPHEMERAL_SECRETS=false \
          DATN_COMPLIANCE_ENV=staging \
          DATN_KEY_CUSTODY_PROVIDER=kms \
          DATN_KEY_CUSTODY_PROVIDER_REF=kms://datn/staging/application-keys \
          DATN_KEY_ROTATION_MAX_DAYS=90 \
          DATN_KEY_REVOCATION_SLA_HOURS=4 \
          DATN_FABRIC_IDENTITY_CUSTODY_PROVIDER=hsm \
          DATN_FABRIC_IDENTITY_POLICY_REF=policy/fabric-identity-custody-staging \
          DATN_FABRIC_IDENTITY_ROTATION_MAX_DAYS=90 \
          DATN_FABRIC_IDENTITY_REVOCATION_SLA_HOURS=4 \
          DATN_BREAK_GLASS_RUNBOOK_REF='docs/platform/key-custody-compliance.md#break-glass-access-policy' \
          DATN_BREAK_GLASS_APPROVER_GROUP=security-approvers \
          DATN_AUDIT_RETENTION_DAYS=2555 \
          DATN_AUDIT_IMMUTABLE_STORAGE=true \
          DATN_AUDIT_LEGAL_HOLD_POLICY_REF=policy/legal-hold-v1 \
          DATN_AUDIT_EXPORT_ENCRYPTION_KEY_REF=kms://datn/staging/audit-export-key \
          DATN_AUDIT_ACCESS_LOG_ENABLED=true \
          ./scripts/deploy/staging-deploy.sh rollback

      - name: Gate on test-output artifact statuses
        run: ./scripts/ci/scan-test-output-status.sh

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "--- docker compose logs (tail) ---"
          docker compose -f docker-compose.yml -f docker-compose.staging.yml logs --no-color backend qr-service qr-python-core ai-service ai-python-core mongo | tail -n 500 || true
          echo "--- running containers ---"
          docker ps -a

      - name: Upload staging deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy-evidence
          path: |
            test-output/deploy/*.json
            test-output/performance/*.json
            .tmp/deploy/*.env
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.staging.yml down --remove-orphans || true
          rm -rf .tmp/deploy/secrets || true