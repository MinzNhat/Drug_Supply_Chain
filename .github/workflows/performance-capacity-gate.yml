name: performance-capacity-gate

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Optional release identifier for capacity evidence
        required: false
        type: string
  schedule:
    - cron: '0 1 * * 1'

permissions:
  contents: read

jobs:
  capacity-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare runtime secrets
        shell: bash
        run: |
          set -euo pipefail

          backend_secret='${{ secrets.DATN_BACKEND_JWT_SECRET }}'
          qr_secret='${{ secrets.DATN_QR_HMAC_SECRET }}'

          if [[ -z "${backend_secret}" ]]; then
            backend_secret="$(openssl rand -hex 32)"
          fi

          if [[ -z "${qr_secret}" ]]; then
            qr_secret="$(openssl rand -hex 32)"
          fi

          echo "DATN_BACKEND_JWT_SECRET=${backend_secret}" >> "${GITHUB_ENV}"
          echo "DATN_QR_HMAC_SECRET=${qr_secret}" >> "${GITHUB_ENV}"

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/run-all.sh scripts/test-all.sh
          chmod +x scripts/blockchain/*.sh
          chmod +x scripts/ci/*.sh

      - name: Bootstrap Fabric binaries
        run: ./scripts/run-all.sh prereq

      - name: Bring up stack
        run: ./scripts/run-all.sh up

      - name: Run capacity gate
        shell: bash
        run: |
          set -euo pipefail

          release_id='${{ inputs.release_id }}'
          if [[ -z "${release_id}" ]]; then
            release_id="${GITHUB_SHA}"
          fi

          BASE_URL=http://localhost:8090 \
          PERF_RELEASE_ID="${release_id}" \
          node scripts/backend/e2e-capacity-gate.mjs

      - name: Gate on test-output artifact statuses
        run: ./scripts/ci/scan-test-output-status.sh

      - name: Upload capacity evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-capacity-evidence
          path: test-output/performance/*.json
          if-no-files-found: warn

      - name: Print diagnostics on failure
        if: failure()
        run: |
          echo "--- docker compose logs (tail) ---"
          docker compose logs --no-color backend qr-service qr-python-core ai-service ai-python-core mongo | tail -n 500 || true
          echo "--- running containers ---"
          docker ps -a

      - name: Cleanup
        if: always()
        run: ./scripts/run-all.sh down || true
