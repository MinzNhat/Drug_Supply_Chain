services:
  python-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    container_name: ai-python-core
    ports:
      - "8700:8700"
    environment:
      AI_MODEL_PATH: /models/best.pt
      AI_INFERENCE_DEVICE: ${AI_INFERENCE_DEVICE:-cpu}
      AI_INFERENCE_IMG_SIZE: ${AI_INFERENCE_IMG_SIZE:-640}
      AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD:-0.5}
      AI_COUNTERFEIT_MIN_SCORE: ${AI_COUNTERFEIT_MIN_SCORE:-0.6}
      AI_AUTHENTIC_MIN_SCORE: ${AI_AUTHENTIC_MIN_SCORE:-0.75}
      AI_COUNTERFEIT_LABELS: ${AI_COUNTERFEIT_LABELS:-counterfeit,fake,gia}
      AI_AUTHENTIC_LABELS: ${AI_AUTHENTIC_LABELS:-authentic,genuine,real}
    volumes:
      - ./models:/models:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8700/health'', timeout=2)"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: ai-service-api
    ports:
      - "8701:8701"
    environment:
      PORT: 8701
      PYTHON_SERVICE_URL: http://python-core:8700
      LOG_LEVEL: info
      REQUEST_TIMEOUT_MS: 10000
    depends_on:
      python-core:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:8701/health'',(r)=>process.exit(r.statusCode===200?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
