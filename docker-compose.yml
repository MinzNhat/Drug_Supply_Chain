services:
  mongo:
    image: mongo:6
    container_name: drug-guard-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  qr-python-core:
    build:
      context: ./protected-qr
      dockerfile: docker/Dockerfile.python
    container_name: qr-python-core
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health'', timeout=2)"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  qr-service:
    build:
      context: ./protected-qr
      dockerfile: docker/Dockerfile.node
    container_name: qr-service
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: protected_qr
      PYTHON_SERVICE_URL: http://qr-python-core:8000
      HMAC_SECRET: ${DATN_QR_HMAC_SECRET:-}
      HMAC_SECRET_FILE: ${DATN_QR_HMAC_SECRET_FILE:-}
      LOG_LEVEL: info
      REQUEST_TIMEOUT_MS: 10000
    depends_on:
      mongo:
        condition: service_healthy
      qr-python-core:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:8080/health'',(r)=>process.exit(r.statusCode===200?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  ai-python-core:
    build:
      context: ./ai-service
      dockerfile: docker/Dockerfile.python
    container_name: ai-python-core
    ports:
      - "8700:8700"
    environment:
      AI_MODEL_PATH: /models/best.pt
      AI_INFERENCE_DEVICE: ${DATN_AI_INFERENCE_DEVICE:-cpu}
      AI_INFERENCE_IMG_SIZE: ${DATN_AI_INFERENCE_IMG_SIZE:-640}
      AI_CONFIDENCE_THRESHOLD: ${DATN_AI_CONFIDENCE_THRESHOLD:-0.5}
      AI_COUNTERFEIT_MIN_SCORE: ${DATN_AI_COUNTERFEIT_MIN_SCORE:-0.6}
      AI_AUTHENTIC_MIN_SCORE: ${DATN_AI_AUTHENTIC_MIN_SCORE:-0.75}
      AI_COUNTERFEIT_LABELS: ${DATN_AI_COUNTERFEIT_LABELS:-counterfeit,fake,gia}
      AI_AUTHENTIC_LABELS: ${DATN_AI_AUTHENTIC_LABELS:-authentic,genuine,real}
    volumes:
      - ./ai-service/models:/models:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8700/health'', timeout=2)"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: docker/Dockerfile.node
    container_name: ai-service
    ports:
      - "8701:8701"
    environment:
      PORT: 8701
      PYTHON_SERVICE_URL: http://ai-python-core:8700
      LOG_LEVEL: info
      REQUEST_TIMEOUT_MS: 10000
    depends_on:
      ai-python-core:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:8701/health'',(r)=>process.exit(r.statusCode===200?0:1)).on(''error'',()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: drug-guard-backend
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: drug_guard
      QR_SERVICE_URL: http://qr-service:8080
      JWT_SECRET: ${DATN_BACKEND_JWT_SECRET:-}
      JWT_SECRET_FILE: ${DATN_BACKEND_JWT_SECRET_FILE:-}
      JWT_EXPIRES_IN: 8h
      LOG_LEVEL: info
      REQUEST_TIMEOUT_MS: 10000
      AI_VERIFICATION_ENABLED: ${DATN_AI_VERIFICATION_ENABLED:-false}
      AI_VERIFICATION_URL: ${DATN_AI_VERIFICATION_URL:-http://ai-service:8701}
      AI_VERIFICATION_TIMEOUT_MS: ${DATN_AI_VERIFICATION_TIMEOUT_MS:-10000}
      AI_VERIFICATION_FAIL_OPEN: ${DATN_AI_VERIFICATION_FAIL_OPEN:-true}
      ALERT_SINK_ENABLED: true
      ALERT_SINK_TYPE: logger
      ALERT_SINK_RETRY_MAX_ATTEMPTS: 3
      ALERT_SINK_RETRY_BASE_DELAY_MS: 200
      ALERT_SINK_RETRY_MAX_DELAY_MS: 2000
      ALERT_SINK_WEBHOOK_URL: ${DATN_ALERT_SINK_WEBHOOK_URL:-}
      ALERT_SINK_WEBHOOK_TIMEOUT_MS: 5000
      ALERT_SINK_WEBHOOK_AUTH_HEADER: authorization
      ALERT_SINK_WEBHOOK_AUTH_TOKEN: ${DATN_ALERT_SINK_WEBHOOK_AUTH_TOKEN:-}
      FABRIC_ENABLED: true
      FABRIC_PROFILE: local
      FABRIC_PROFILE_FILE: ${DATN_BACKEND_FABRIC_PROFILE_FILE:-}
      FABRIC_STRICT_CREDENTIALS: false
      FABRIC_CHANNEL_NAME: mychannel
      FABRIC_CHAINCODE_NAME: drugtracker
      FABRIC_EVALUATE_TIMEOUT_MS: 5000
      FABRIC_SUBMIT_TIMEOUT_MS: 15000
      FABRIC_COMMIT_STATUS_TIMEOUT_MS: 20000
      FABRIC_EVALUATE_RETRY_MAX_ATTEMPTS: 3
      FABRIC_EVALUATE_RETRY_BASE_DELAY_MS: 200
      FABRIC_EVALUATE_RETRY_MAX_DELAY_MS: 1000
      FABRIC_SUBMIT_RETRY_MAX_ATTEMPTS: 1
      FABRIC_SUBMIT_RETRY_BASE_DELAY_MS: 250
      FABRIC_SUBMIT_RETRY_MAX_DELAY_MS: 1200
      FABRIC_PUBLIC_SCAN_ROLE: Regulator
      FABRIC_MANUFACTURER_MSP_ID: Org2MSP
      FABRIC_MANUFACTURER_PEER_ENDPOINT: host.docker.internal:9051
      FABRIC_MANUFACTURER_PEER_HOST_ALIAS: peer0.org2.example.com
      FABRIC_MANUFACTURER_TLS_CERT_PATH: /fabric/organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls/ca.crt
      FABRIC_MANUFACTURER_CERT_PATH: /fabric/organizations/peerOrganizations/org2.example.com/users/User1@org2.example.com/msp/signcerts/User1@org2.example.com-cert.pem
      FABRIC_MANUFACTURER_KEY_PATH: /fabric/organizations/peerOrganizations/org2.example.com/users/User1@org2.example.com/msp/keystore
      FABRIC_DISTRIBUTOR_MSP_ID: Org3MSP
